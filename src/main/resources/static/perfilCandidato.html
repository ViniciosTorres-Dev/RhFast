<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/pace/1.2.4/pace-theme-default.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pace/1.2.4/pace.min.js"></script>
    <link href="images/icons/favicon.ico" rel="icon" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/simplebar/5.3.6/simplebar.min.css" rel="stylesheet"/>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"
          type="text/css"/>

    <link href="css/sidebar-menu.css" rel="stylesheet"/>
    <link href="css/mainCandidato.css" rel="stylesheet"/>
</head>

<body class="bg-theme bg-theme1">
<div id="wrapper">
    <!-- Sidebar -->
    <div data-simplebar="" data-simplebar-auto-hide="true" id="sidebar-wrapper">
        <div class="brand-logo">
            <a href="mainCandidato.html">
                <i class="zmdi zmdi-fire logo-icon text-white" style="font-size: 24px;"></i>
                <h5 class="logo-text">RH Fast</h5>
            </a>
        </div>
        <ul class="sidebar-menu do-nicescrol">
            <li class="sidebar-header">MENU PRINCIPAL</li>
            <li><a href="mainCandidato.html"><i class="zmdi zmdi-view-dashboard"></i> <span>Vagas Disponíveis</span></a>
            </li>
            <li><a href="minhasCandidaturas.html"><i class="zmdi zmdi-assignment-check"></i>
                <span>Minhas Candidaturas</span></a></li>
            <li><a href="chat.html"><i class="zmdi zmdi-comment-text"></i> <span>Chat</span></a></li>
            <li><a href="configuracoesCandidato.html"><i class="zmdi zmdi-settings"></i> <span>Configurações</span></a>
            </li>
            <li class="active"><a href="perfilCandidato.html"><i class="zmdi zmdi-account-circle"></i>
                <span>Minha Conta</span></a></li>
            <li><a href="#" onclick="logout()"><i class="zmdi zmdi-power"></i> <span>Sair</span></a></li>
        </ul>
    </div>

    <!-- Topbar -->
    <header class="topbar-nav">
        <nav class="navbar navbar-expand fixed-top">
            <ul class="navbar-nav mr-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link toggle-menu" href="javascript:void();"><i
                            class="icon-menu menu-icon text-white"></i></a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center right-nav-link">
                <li class="nav-item">
                    <a class="nav-link dropdown-toggle dropdown-toggle-nocaret" data-toggle="dropdown" href="#">
                        <span class="user-profile"><img alt="user avatar" class="img-circle"
                                                        src="https://placehold.co/110x110"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-right" style="background-color: #000;">
                        <li class="dropdown-item user-details">
                            <a href="perfilCandidato.html">
                                <div class="media">
                                    <div class="avatar"><img alt="user avatar"
                                                             class="align-self-start mr-3" src="https://placehold.co/110x110"></div>
                                    <div class="media-body">
                                        <h6 class="mt-2 user-title" id="navNomeCandidato">Candidato</h6>
                                        <p class="user-subtitle">Buscando Oportunidades</p>
                                    </div>
                                </div>
                            </a>
                        </li>
                        <li class="dropdown-divider"></li>
                        <li class="dropdown-item" onclick="window.location.href='perfilCandidato.html'"><i
                                class="zmdi zmdi-account-circle mr-2"></i> Perfil
                        </li>
                        <li class="dropdown-divider"></li>
                        <li class="dropdown-item" onclick="logout()"><i class="zmdi zmdi-power mr-2"></i> Sair</li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="clearfix"></div>

    <!-- Conteúdo Principal -->
    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="row mt-3">
                <div class="col-lg-8 mx-auto">
                    <!-- Informações do Perfil -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="card-title">Editar Perfil</div>
                            <hr>
                            <form id="perfilForm">
                                <input id="candidatoId" type="hidden">
                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="nome">Nome</label>
                                        <input class="form-control" id="nome" required type="text">
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label for="sobrenome">Sobrenome</label>
                                        <input class="form-control" id="sobrenome" required type="text">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="cpf">CPF</label>
                                        <input class="form-control" id="cpf" required type="text">
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label for="dataNascimento">Data de Nascimento</label>
                                        <input class="form-control" id="dataNascimento" required type="date">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label for="email">Email</label>
                                        <input class="form-control" id="email" required type="email">
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label for="telefone">Telefone</label>
                                        <input class="form-control" id="telefone" type="text">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-4 form-group">
                                        <label for="cep">CEP</label>
                                        <input class="form-control" id="cep" type="text">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label for="cidade">Cidade</label>
                                        <input class="form-control" id="cidade" type="text">
                                    </div>
                                    <div class="col-md-4 form-group">
                                        <label for="estado">Estado</label>
                                        <input class="form-control" id="estado" type="text">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="logradouro">Logradouro</label>
                                    <input class="form-control" id="logradouro" type="text">
                                </div>
                                <div class="form-group">
                                    <label for="situacao">Situação Profissional</label>
                                    <select class="form-control" id="situacao">
                                        <option value="BUSCANDO_OPORTUNIDADE">Buscando Oportunidade</option>
                                        <option value="EMPREGADO_MAS_ABERTO">Empregado, mas aberto a propostas</option>
                                        <option value="NAO_BUSCANDO">Não estou buscando</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="senha">Nova Senha (deixe em branco para não alterar)</label>
                                    <input class="form-control" id="senha" type="password">
                                </div>
                                <div class="form-group mt-4">
                                    <button class="btn btn-primary" type="submit"><i class="zmdi zmdi-save"></i> Salvar
                                        Alterações
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Gerenciamento de Currículos -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="card-title">Meus Currículos</div>
                            <hr>
                            <div class="mb-4" id="listaCurriculos">
                                <p class="text-muted text-center">Buscando currículos...</p>
                            </div>

                            <h5 class="text-white mt-4">Adicionar Novo Currículo</h5>
                            <form class="mt-3" id="uploadCurriculoForm">
                                <div class="form-group">
                                    <label>Arquivo (PDF, DOC, DOCX)</label>
                                    <input accept=".pdf,.doc,.docx" class="form-control-file" id="arquivoCurriculo"
                                           required type="file">
                                </div>
                                <button class="btn btn-info btn-sm mt-2" type="submit"><i class="zmdi zmdi-upload"></i>
                                    Enviar Currículo
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
            <div class="overlay toggle-menu"></div>
        </div>
    </div>
    <a class="back-to-top" href="javaScript:void();"><i class="fa fa-angle-double-up"></i></a>
    <footer class="footer">
        <div class="container">
            <div class="text-center">Copyright © 2026 RH Fast</div>
        </div>
    </footer>
</div>

<script src="js/app-script.js"></script>
<script src="js/perfilCandidato.js"></script>
<script src="js/logout.js"></script>
</body>
</html>
