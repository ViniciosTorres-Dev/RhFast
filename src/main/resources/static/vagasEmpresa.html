<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>RH Fast - Vagas da Empresa</title>

    <link href="images/icons/favicon.ico" rel="icon" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/simplebar/5.3.6/simplebar.min.css" rel="stylesheet"/>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="fonts/iconic/css/material-design-iconic-font.min.css" rel="stylesheet" type="text/css"/>
    <link href="css/sidebar-menu.css" rel="stylesheet"/>
    <link href="css/mainRecrutador.css" rel="stylesheet"/>
</head>

<body class="bg-theme bg-theme1">
<div id="wrapper">
    <!-- Sidebar -->
    <div data-simplebar="" data-simplebar-auto-hide="true" id="sidebar-wrapper">
        <div class="brand-logo">
            <a href="mainRecrutador.html">
                <i class="zmdi zmdi-fire logo-icon text-white"></i>
                <h5 class="logo-text">RH Fast</h5>
            </a>
        </div>
        <ul class="sidebar-menu do-nicescrol">
            <li class="sidebar-header">MENU PRINCIPAL</li>
            <li><a href="mainRecrutador.html"><i class="zmdi zmdi-view-dashboard"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="vagasEmpresa.html"><i class="zmdi zmdi-folder-star"></i>
                <span>Vagas da Empresa</span></a></li>
            <li><a href="chat.html"><i class="zmdi zmdi-comment-text"></i> <span>Chat</span></a></li>
            <li><a href="configuracoesRecrutador.html"><i class="zmdi zmdi-settings"></i> <span>Configurações</span></a>
            </li>
            <li><a href="perfilRecrutador.html"><i class="zmdi zmdi-account-circle"></i> <span>Minha Conta</span></a>
            </li>
            <li><a href="#" onclick="logout()"><i class="zmdi zmdi-power"></i> <span>Sair</span></a></li>
            <li class="sidebar-header">AÇÕES</li>
            <li><a href="novaVaga.html"><i class="zmdi zmdi-plus text-success"></i> <span>Nova Vaga</span></a></li>
        </ul>
    </div>

    <!-- Topbar -->
    <header class="topbar-nav">
        <nav class="navbar navbar-expand fixed-top">
            <ul class="navbar-nav mr-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link toggle-menu" href="javascript:void();"><i
                            class="icon-menu menu-icon text-white"></i></a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="clearfix"></div>

    <div class="content-wrapper">
        <div class="container-fluid">
            <div class="card mt-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="text-white mb-0">Todas as Vagas da Empresa</h5>
                    <span class="badge badge-primary" id="totalVagasCount"></span>
                </div>
                <div class="card-body">
                    <!-- Filtros -->
                    <div class="form-row mb-4">
                        <div class="col-md-3">
                            <label for="filtroStatus">Status</label>
                            <select class="form-control" id="filtroStatus">
                                <option value="">Todos</option>
                                <option value="ABERTA">Aberta</option>
                                <option value="ENCERRADA">Encerrada</option>
                                <option value="CANCELADA">Cancelada</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="filtroTempo">Período</label>
                            <select class="form-control" id="filtroTempo">
                                <option value="">Qualquer data</option>
                                <option value="7">Últimos 7 dias</option>
                                <option value="30">Últimos 30 dias</option>
                                <option value="90">Últimos 90 dias</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="filtroSetor">Setor</label>
                            <input class="form-control" id="filtroSetor" placeholder="Filtrar por setor..." type="text">
                        </div>
                        <div class="col-md-3">
                            <label for="filtroCandidatos">Mín. Candidatos</label>
                            <input class="form-control" id="filtroCandidatos" min="0" placeholder="Nº" type="number">
                        </div>
                    </div>

                    <!-- Tabela de Vagas -->
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>Título da Vaga</th>
                                <th>Setor</th>
                                <th>Status</th>
                                <th>Candidatos</th>
                                <th>Data de Postagem</th>
                                <th>Ações</th>
                            </tr>
                            </thead>
                            <tbody id="tabelaVagasEmpresa">
                            <!-- Linhas serão inseridas pelo JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <a class="back-to-top" href="javaScript:void();"><i class="fa fa-angle-double-up"></i></a>
    <footer class="footer">
        <div class="container">
            <div class="text-center">Copyright © 2024 RH Fast</div>
        </div>
    </footer>
</div>

<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
<script src="vendor/bootstrap/js/popper.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplebar/5.3.6/simplebar.min.js"></script>
<script src="js/sidebar-menu.js"></script>
<script src="js/app-script.js"></script>
<script src="js/logout.js"></script>
<script src="js/vagasEmpresa.js"></script>

</body>
</html>
