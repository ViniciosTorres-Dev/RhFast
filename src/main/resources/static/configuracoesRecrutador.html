<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>RH Fast - Configurações (Recrutador)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/icons/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/iconic/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <link rel="stylesheet" type="text/css" href="css/mainRecrutador.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="mainRecrutador.html">RH Fast</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="mainRecrutador.html">Dashboard</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Configurações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="perfilRecrutador.html">Minha Conta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <h2>Configurações</h2>
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                    <a class="nav-link active" id="v-pills-acessibilidade-tab" data-toggle="pill" href="#v-pills-acessibilidade" role="tab" aria-controls="v-pills-acessibilidade" aria-selected="true">Acessibilidade</a>
                    <a class="nav-link" id="v-pills-privacidade-tab" data-toggle="pill" href="#v-pills-privacidade" role="tab" aria-controls="v-pills-privacidade" aria-selected="false">Privacidade</a>
                    <a class="nav-link" id="v-pills-notificacoes-tab" data-toggle="pill" href="#v-pills-notificacoes" role="tab" aria-controls="v-pills-notificacoes" aria-selected="false">Notificações</a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="tab-content" id="v-pills-tabContent">
                    <!-- Acessibilidade -->
                    <div class="tab-pane fade show active" id="v-pills-acessibilidade" role="tabpanel" aria-labelledby="v-pills-acessibilidade-tab">
                        <h4>Acessibilidade</h4>
                        <hr>
                        <form>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="altoContraste">
                                <label class="form-check-label" for="altoContraste">Ativar Alto Contraste</label>
                            </div>
                            <div class="form-group">
                                <label for="tamanhoFonte">Tamanho da Fonte</label>
                                <select class="form-control" id="tamanhoFonte">
                                    <option value="normal">Normal</option>
                                    <option value="grande">Grande</option>
                                    <option value="muito-grande">Muito Grande</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="salvarConfiguracoes('acessibilidade')">Salvar Alterações</button>
                        </form>
                    </div>

                    <!-- Privacidade -->
                    <div class="tab-pane fade" id="v-pills-privacidade" role="tabpanel" aria-labelledby="v-pills-privacidade-tab">
                        <h4>Privacidade</h4>
                        <hr>
                        <form>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="perfilPublico" checked>
                                <label class="form-check-label" for="perfilPublico">Perfil Público (Visível para candidatos)</label>
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="compartilharDados" checked>
                                <label class="form-check-label" for="compartilharDados">Compartilhar dados anônimos para estatísticas</label>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="salvarConfiguracoes('privacidade')">Salvar Alterações</button>
                        </form>
                    </div>

                    <!-- Notificações -->
                    <div class="tab-pane fade" id="v-pills-notificacoes" role="tabpanel" aria-labelledby="v-pills-notificacoes-tab">
                        <h4>Notificações</h4>
                        <hr>
                        <form>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="notifEmail" checked>
                                <label class="form-check-label" for="notifEmail">Receber notificações por e-mail</label>
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="notifNovosCandidatos" checked>
                                <label class="form-check-label" for="notifNovosCandidatos">Notificar quando houver novos candidatos</label>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="salvarConfiguracoes('notificacoes')">Salvar Alterações</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="vendor/bootstrap/js/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.min.js"></script>
    <script>
        function salvarConfiguracoes(tipo) {
            // Simulação de salvamento
            alert('Configurações de ' + tipo + ' salvas com sucesso!');
        }
    </script>

</body>
</html>
