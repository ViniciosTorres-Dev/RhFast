<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>RH Fast - Detalhes da Admissão</title>
    <link href="images/icons/favicon.ico" rel="icon" type="image/x-icon">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="fonts/iconic/css/material-design-iconic-font.min.css" rel="stylesheet" type="text/css"/>
    <link href="css/mainRecrutador.css" rel="stylesheet"/>
    <style>
        .doc-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .status-pendente { border-left: 3px solid #ffc107; }
        .status-enviado { border-left: 3px solid #17a2b8; }
        .status-aprovado { border-left: 3px solid #28a745; }
        .status-rejeitado { border-left: 3px solid #dc3545; }
    </style>
</head>
<body class="bg-theme bg-theme1">

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="mainRecrutador.html"><i class="zmdi zmdi-fire mr-2"></i>RH Fast</a>
    </div>
</nav>

<div class="clearfix"></div>

<div class="content-wrapper" style="margin-left: 0; padding-top: 90px;">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <button class="btn btn-secondary mb-3" onclick="window.history.back()"><i
                        class="zmdi zmdi-arrow-left"></i> Voltar
                </button>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0 text-white">Processo de Admissão</h5>
                            <p class="mb-0 small text-muted">Vaga: <span id="nomeVaga">...</span></p>
                        </div>
                        <div class="text-right">
                            <h6 class="mb-0 text-white" id="nomeCandidato">Carregando...</h6>
                            <p class="mb-0 small text-muted">Candidato</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <h5 class="text-white">Documentos Recebidos</h5>
                        <p class="text-muted small">Avalie os documentos enviados pelo candidato.</p>
                        <div id="documentosContainer">
                            <p class="text-center text-muted">Buscando documentos...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
<script src="vendor/bootstrap/js/popper.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.min.js"></script>
<script src="js/logout.js"></script>
<script src="js/detalhesAdmissao.js"></script>

</body>
</html>
