<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>RH Fast - Criar Teste</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="images/icons/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/iconic/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <link rel="stylesheet" type="text/css" href="css/mainRecrutador.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="mainRecrutador.html">RH Fast</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="mainRecrutador.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="configuracoesRecrutador.html">Configurações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="perfilRecrutador.html">Minha Conta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Criar Novo Teste</h2>
            <a href="#" id="btnVoltarVaga" class="btn btn-secondary">Voltar para Vaga</a>
        </div>

        <div class="card">
            <div class="card-body">
                <form id="formCriarTeste">
                    <div class="form-group">
                        <label for="tituloTeste">Título do Teste</label>
                        <input type="text" class="form-control" id="tituloTeste" required>
                    </div>
                    <div class="form-group">
                        <label for="tipoTeste">Tipo de Teste</label>
                        <select class="form-control" id="tipoTeste" required>
                            <option value="TECNICO">Técnico</option>
                            <option value="COMPORTAMENTAL">Comportamental</option>
                            <option value="LOGICA">Lógica</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="descricaoTeste">Descrição / Instruções</label>
                        <textarea class="form-control" id="descricaoTeste" rows="3"></textarea>
                    </div>

                    <hr>
                    <h4>Perguntas</h4>
                    <div id="perguntasContainer">
                        <!-- Perguntas serão adicionadas aqui -->
                    </div>

                    <button type="button" class="btn btn-info mt-3" onclick="adicionarPergunta()">+ Adicionar Pergunta</button>

                    <hr>
                    <button type="submit" class="btn btn-primary btn-lg btn-block">Salvar Teste</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="vendor/bootstrap/js/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.min.js"></script>
    <script src="js/criarTeste.js"></script>

</body>
</html>
