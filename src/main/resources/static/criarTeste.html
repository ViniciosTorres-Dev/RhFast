<div class="clearfix"></div>

<div class="content-wrapper" style="margin-left: 0; padding-top: 90px;">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        Criar Teste para a Vaga
                    </div>
                    <div class="card-body">
                        <form id="formCriarTeste">
                            <input id="vagaId" type="hidden">
                            <div class="form-group">
                                <label>Título do Teste</label>
                                <label for="tituloTeste"></label><input class="form-control" id="tituloTeste"
                                                                        placeholder="Ex: Teste de Lógica de Programação" required
                                                                        type="text">
                            </div>
                            <div class="form-group">
                                <label>Descrição / Instruções</label>
                                <label for="descricaoTeste"></label><textarea class="form-control" id="descricaoTeste"
                                                                              placeholder="Descreva as instruções para o candidato..." required
                                                                              rows="4"></textarea>
                            </div>

                            <h5 class="mt-4 mb-3 text-white">Questões</h5>
                            <div id="questoesContainer">
                                <!-- Questões serão adicionadas aqui dinamicamente -->
                            </div>

                            <button class="btn btn-secondary btn-sm mt-2" onclick="adicionarQuestao()" type="button"><i
                                    class="zmdi zmdi-plus"></i> Adicionar Questão
                            </button>

                            <div class="form-group mt-4 border-top border-light pt-3">
                                <button class="btn btn-primary" type="submit"><i class="zmdi zmdi-save"></i> Salvar
                                    Teste
                                </button>
                                <button class="btn btn-secondary ml-2" onclick="window.history.back()" type="button">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
