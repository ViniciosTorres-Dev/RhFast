<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>RH Fast - Perfil do Recrutador</title>
    <link href="images/icons/favicon.ico" rel="icon" type="image/x-icon">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="fonts/iconic/css/material-design-iconic-font.min.css" rel="stylesheet" type="text/css"/>
    <link href="css/mainCandidato.css" rel="stylesheet"/>
    <style>
        .profile-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #14b6ff;
        }
    </style>
</head>
<body class="bg-theme bg-theme1">

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="mainCandidato.html"><i class="zmdi zmdi-fire mr-2"></i>RH Fast</a>
    </div>
</nav>

<div class="clearfix"></div>

<div class="content-wrapper" style="margin-left: 0; padding-top: 90px;">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button class="btn btn-secondary mb-3" onclick="window.history.back()"><i
                        class="zmdi zmdi-arrow-left"></i> Voltar
                </button>
                <div class="profile-card">

                    <div class="d-flex align-items-center mb-4">
                        <img alt="Avatar do Recrutador" class="profile-avatar mr-4" src="https://placehold.co/150x150">
                        <div>
                            <h3 class="text-white mb-1" id="nomeRecrutador">Carregando...</h3>
                            <h5 class="text-info mb-0" id="cargoRecrutador">...</h5>
                        </div>
                    </div>

                    <hr class="border-light">
                    <h4 class="text-white mt-4">Empresa</h4>
                    <h5 class="text-white-50" id="nomeEmpresa">...</h5>
                    <p class="text-muted" id="localEmpresa">...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
<script src="vendor/bootstrap/js/popper.min.js"></script>
<script src="vendor/bootstrap/js/bootstrap.min.js"></script>
<script src="js/perfilPublicoRecrutador.js"></script>

</body>
</html>
